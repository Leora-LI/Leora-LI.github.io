<!-- ======================================== -->
<!-- 性能优化建议 -->
<!-- ======================================== -->

<!--
1. 视频格式
   - MP4: 最兼容，文件较大
   - WebM: Google推荐，高压缩
   - Ogv: 开源，兼容性一般

2. 文件大小
   - 推荐: 10-50MB
   - 封面: 1-2MB
   - 字幕: <100KB

3. 分辨率
   - 720p: 标准清晰度
   - 1080p: 高清
   - 不建议超过 1080p

4. 比特率
   - 720p: 2-3 Mbps
   - 1080p: 4-6 Mbps

5. CDN 加速
   - GitHub + jsDelivr
   - YouTube
   - Vimeo
   - 阿里云 OSS
-->
