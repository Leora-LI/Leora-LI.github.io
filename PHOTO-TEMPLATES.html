   - 阴影效果

2. 项目图片 (.project-image)
   - 响应式尺寸
   - 图片放大动画
   - 圆角处理

3. 项目卡片图片 (.project-card-image)
   - 卡片内集成图片
   - 悬停放大效果
   - 自动剪裁

4. 通用图片 (img)
   - 最大宽度限制
   - 自适应高度
-->
